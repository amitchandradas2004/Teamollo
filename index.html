<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teamollo</title>
    <link
      rel="shortcut icon"
      href="./Assets/Icons/favicon.png"
      type="image/x-icon"
    />
    <link
      rel="shortcut icon"
      href="./Assets/Component 128.png"
      type="image/x-icon"
    />
    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Font : Manrope-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <!-- CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      .manrope {
        font-family: "Manrope", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
    </style>
  </head>
  <body class="manrope">
    <header>
      <!-- Navbar -->
      <nav class="container mx-auto py-2">
        <div class="flex justify-between items-center">
          <div>
            <h2 class="text-3xl font-bold">
              <span class="text-[#B5ED3D]">Team</span>ollo<span
                class="text-[#B5ED3D]"
                >.</span
              >
            </h2>
          </div>
          <div class="flex items-center">
            <button
              class="btn border-2 border-white w-45 h-12 rounded-full shadow-md font-bold text-xl"
            >
              Let’s talk
            </button>
            <!-- Sidebar -->
            <div class="drawer">
              <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
              <div class="drawer-content flex flex-col">
                <!-- Navbar -->
                <div class="navbar justify-end">
                  <div class="flex-none">
                    <label
                      for="my-drawer-2"
                      aria-label="open sidebar"
                      class="btn btn-ghost"
                    >
                      <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        class="inline-block h-6 w-6 stroke-current"
                      >
                        <path
                          stroke-linecap="round"
                          stroke-linejoin="round"
                          stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"
                        ></path>
                      </svg>
                    </label>
                  </div>
                </div>
              </div>
              <div class="drawer-side">
                <label
                  for="my-drawer-2"
                  aria-label="close sidebar"
                  class="drawer-overlay"
                ></label>
                <ul class="menu bg-base-200 min-h-full w-50 p-4">
                  <!-- Sidebar content here -->
                  <li><a>Sidebar Item 1</a></li>
                  <li><a>Sidebar Item 2</a></li>
                </ul>
              </div>
            </div>
          </div>
        </div>
        
      </nav>
    </header>
  </body>
</html>
